telegram:
  bot_token: "123456:replace-me"
  channel_id: "@your_channel"
  admin_user_ids: []

xhs:
  cookies: "a1=replace-me; webId=replace-me"
  proxies: null

sources:
  keywords:
    enabled: true
    # Legacy single-rule mode still works:
    # rules_path: "https://gist.github.com/XXX/raw/xhs_keyword_rules.yaml"
    rules:
      - name: "A"
        weight: 0.7
        rules_path: "https://gist.github.com/XXX/raw/xhs_keyword_rules_A.yaml"
      - name: "B"
        weight: 0.3
        rules_path: "https://gist.github.com/XXX/raw/xhs_keyword_rules_B.yaml"
    search_limit_per_query: 20
    sort_type: 0
    note_type: 0
  homefeed:
    enabled: false
    categories:
      - "homefeed_recommend"
    limit_per_category: 20

publishing:
  notes_per_run: 5
  media_strategy: "all"
  caption_parse_mode: "HTML"
  telegram_retry_after_padding_seconds: 2
  note_interval_seconds: 5
  upload_live_photo: true  # false = Live Photo 按普通图片上传

debug:
  enabled: false

logging:
  level: "INFO"
  console_enabled: true
  file_enabled: true
  file_path: "logs/rednote2tg.log"
  max_bytes: 5242880
  retention_days: 14
  max_files: 20
  compress_rotated: true

dedup:
  ttl_days: 14

schedule:
  timezone: "Asia/Shanghai"
  interval_minutes: 50
  jitter_minutes: 10
  quiet_window:
    start: "03:00"
    end: "09:00"

storage:
  sqlite_path: "data/rednote2tg.db"
  media_temp_dir: "data/tmp_media"
